openapi: 3.0.3
info:
  title: UniSphere API
  description: Smart Campus Events & Clubs Hub REST API
  version: 1.0.0
  contact:
    name: deoxyforge
    url: https://github.com/deoxyforge/UniSphere

servers:
  - url: http://localhost:5000/api
    description: Local development
  - url: https://your-render-backend.onrender.com/api
    description: Production (Render)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [Student, Faculty, Admin] }
        department: { type: string }
        interests: { type: array, items: { type: string } }
        joinedClubs: { type: array, items: { type: string } }
    Event:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        venue: { type: string }
        date: { type: string }
        time: { type: string }
        banner: { type: string }
        capacity: { type: integer }
        status: { type: string, enum: [pending, approved, rejected] }
        organizer: { type: string }
        registeredStudents: { type: array, items: { type: string } }
    Club:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        description: { type: string }
        category: { type: string }
        logo: { type: string }
        coordinator: { type: string }
        members: { type: array, items: { type: string } }
    Error:
      type: object
      properties:
        message: { type: string }

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              example: { status: healthy, timestamp: "2026-07-10T00:00:00Z" }

  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [Student, Faculty, Admin], default: Student }
                department: { type: string }
      responses:
        '201':
          description: User registered
          content:
            application/json:
              example: { token: "jwt.token.here", user: { _id: "abc", name: "Alice", role: "Student" } }
        '400':
          description: Validation error or email already exists

  /auth/login:
    post:
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              example: { token: "jwt.token.here", user: { _id: "abc", name: "Alice", role: "Student" } }
        '401':
          description: Invalid credentials

  /auth/profile:
    get:
      summary: Get authenticated user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      summary: Update profile
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                department: { type: string }
                biography: { type: string }
                skills: { type: array, items: { type: string } }
                interests: { type: array, items: { type: string } }
                profileImage: { type: string, format: binary }
      responses:
        '200':
          description: Profile updated

  /events:
    get:
      summary: List all events
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [pending, approved, rejected] }
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
    post:
      summary: Create a new event (Faculty/Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, description, category, venue, date, time, capacity]
              properties:
                title: { type: string }
                description: { type: string }
                category: { type: string }
                venue: { type: string }
                date: { type: string }
                time: { type: string }
                capacity: { type: integer }
                banner: { type: string, format: binary }
      responses:
        '201':
          description: Event created (pending for Faculty, approved for Admin)
        '403':
          description: Forbidden (Student cannot create events)

  /events/recommendations/user:
    get:
      summary: AI-recommended events for the authenticated student
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ranked events with aiScore and aiReason
          content:
            application/json:
              example: [{ _id: "evt1", title: "Hackathon", aiScore: 85, aiReason: "Matches your interests" }]

  /events/registrations/user:
    get:
      summary: Get student's own registrations
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of registrations with populated event

  /events/{id}:
    get:
      summary: Get event by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Event document
        '404':
          description: Event not found
    put:
      summary: Update event
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema: { type: object }
      responses:
        '200': { description: Event updated }
        '403': { description: Forbidden }
    delete:
      summary: Delete event
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Event deleted }
        '403': { description: Forbidden }

  /events/{id}/approve:
    put:
      summary: Approve pending event (Admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Event approved }
        '403': { description: Admin only }

  /events/{id}/reject:
    put:
      summary: Reject pending event (Admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Event rejected }

  /events/{id}/register:
    post:
      summary: Register for an event (Student)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '201': { description: Registration successful with QR data }
        '400': { description: Already registered or event full }

  /events/{id}/registrations:
    get:
      summary: Get registrations for an event (Faculty/Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: List of registrants }

  /events/registrations/{regId}:
    delete:
      summary: Cancel a registration (Student - own only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: regId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Registration cancelled }

  /clubs:
    get:
      summary: List all clubs
      responses:
        '200':
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Club'
    post:
      summary: Create a club (Faculty/Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, description, category]
              properties:
                name: { type: string }
                description: { type: string }
                category: { type: string }
                logo: { type: string, format: binary }
      responses:
        '201': { description: Club created }

  /clubs/join:
    post:
      summary: Join a club (Student)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [clubId]
              properties:
                clubId: { type: string }
      responses:
        '200': { description: Joined club }

  /clubs/leave:
    post:
      summary: Leave a club (Student)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [clubId]
              properties:
                clubId: { type: string }
      responses:
        '200': { description: Left club }

  /clubs/{id}:
    get:
      summary: Get club by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Club document }
        '404': { description: Not found }
    put:
      summary: Update club (Coordinator/Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Updated }
    delete:
      summary: Delete club (Coordinator/Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted }

  /attendance:
    post:
      summary: Mark attendance for a student
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [eventId, studentId, attended]
              properties:
                eventId: { type: string }
                studentId: { type: string }
                attended: { type: boolean }
      responses:
        '201': { description: Attendance marked }

  /attendance/event/{eventId}:
    get:
      summary: Get attendance report for event (Faculty/Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Attendance records }

  /attendance/student:
    get:
      summary: Get student's attendance history
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Attendance history }

  /notifications:
    get:
      summary: Get all notifications for authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: List of notifications }

  /notifications/read:
    put:
      summary: Mark all notifications as read
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Marked as read }

  /analytics/search:
    get:
      summary: Smart ranked search across events and clubs
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [all, events, clubs], default: all }
      responses:
        '200':
          description: Ranked search results
          content:
            application/json:
              example: { events: [], clubs: [], query: "hackathon" }

  /analytics/student/insights:
    get:
      summary: AI student insights (participation, engagement, recommendations)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Student insights
          content:
            application/json:
              example:
                participationScore: 65
                engagementScore: 80
                totalRegistrations: 5
                totalAttended: 4
                mostInterestedCategories: [{ category: Tech, count: 3 }]
                mostActiveClub: "CS Club"
                activityTimeline: []
                upcomingRecommendations: []

  /analytics/events/{eventId}/predict:
    get:
      summary: Predict attendance for an event
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Attendance prediction
          content:
            application/json:
              example:
                predictedRate: 78
                predictedCount: 47
                confidence: 75
                reasoning: "Weekday event (+5%), high engagement category (+8%)"

  /analytics/faculty:
    get:
      summary: Faculty analytics (own events performance)
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Faculty analytics data }

  /analytics/admin:
    get:
      summary: Admin platform analytics
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Platform-wide statistics }
